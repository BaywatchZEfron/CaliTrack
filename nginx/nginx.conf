server {
    listen 80;
    server_name _;

    # ── Frontend Vue ──────────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
        # Redirige al contenedor frontend
        proxy_set_header Host System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP ;
    }

    # ── Backend Laravel API ───────────────────────────────────────────────────
    location /api/ {
        root /var/www/public;
        try_files  / /index.php?;

        location ~ \.php$ {
            fastcgi_pass backend:9000;
            # backend:9000 → nombre del contenedor Laravel + puerto FPM
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/public;
            include fastcgi_params;
        }
    }
}
